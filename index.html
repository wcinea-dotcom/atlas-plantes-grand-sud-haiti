<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas des Plantes du Grand-Sud d'Haïti</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f8f0; padding: 20px; text-align: center; }
    h1 { color: #006400; }
    #search { width: 300px; padding: 10px; margin-bottom: 20px; }
    #results { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .plante-card { background: white; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
    .plante-card h2 { color: #228B22; }
    .admin-link { background: #006400; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 20px; }
    .admin-link:hover { background: #004d00; }
  </style>
</head>
<body>
  <h1>🌿 Atlas des Plantes du Grand-Sud d'Haïti</h1>
  <p>Bienvenue ! Cherchez par maladie, système, plante ou famille (ex. "hypertension", "digestif", "Pèpèt", "Acanthacées").</p>
  <input type="text" id="search" placeholder="Rechercher...">
  <div id="results"></div>
  <a href="/admin" class="admin-link">Accès Administration</a>

  <script>
    // Charge les plantes
    async function chargerPlantes() {
      const response = await fetch('/data/plants_index.json');  # Si tu as un index, sinon change pour charger tous les JSON
      const plantes = await response.json();
      return plantes;
    }

    async function init() {
      const plantes = await chargerPlantes();
      const searchInput = document.getElementById('search');
      const resultsDiv = document.getElementById('results');

      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = plantes.filter(plante => 
          (plante.maladies && plante.maladies.toLowerCase().includes(query)) ||
          (plante.systemes_concernes && plante.systemes_concernes.toLowerCase().includes(query)) ||
          (plante.nom_creole && plante.nom_creole.toLowerCase().includes(query)) ||
          (plante.famille_fr && plante.famille_fr.toLowerCase().includes(query)) ||
          (plante.nom_scientifique && plante.nom_scientifique.toLowerCase().includes(query))
        );

        resultsDiv.innerHTML = '';
        filtered.forEach(plante => {
          const card = document.createElement('div');
          card.className = 'plante-card';
          card.innerHTML = `
            <h2>${plante.nom_creole} (${plante.nom_scientifique})</h2>
            <p><strong>Famille : </strong>${plante.famille_fr || 'N/A'}</p>
            <p><strong>Maladies : </strong>${plante.maladies || 'N/A'}</p>
            <p><strong>Systèmes : </strong>${plante.systemes_concernes || 'N/A'}</p>
            <p><strong>Usage Haïti : </strong>${plante.usage_haiti || 'N/A'}</p>
            <a href="${plante.lien_pubmed}" target="_blank">Voir sur PubMed</a>
          `;
          resultsDiv.appendChild(card);
        });
      });
    }

    init();
  </script>
</body>
</html>
